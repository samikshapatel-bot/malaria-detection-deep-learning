<!DOCTYPE html>
<html>
<head>
<title>Malaria Detection System</title>
<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:40px;
border-radius:15px;
text-align:center;
width:400px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

button{
background:#667eea;
color:white;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#5a67d8;
}

#result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>🦠 Malaria Detection</h2>

<form id="uploadForm">
<input type="file" name="file" id="fileInput" required>
<br>
<button type="submit">Predict</button>
</form>

<div id="result"></div>

</div>

<script>

document.getElementById("uploadForm").onsubmit = async function(e){
e.preventDefault()

let fileInput=document.getElementById("fileInput")
let formData=new FormData()
formData.append("file",fileInput.files[0])

let response=await fetch("/predict",{
method:"POST",
body:formData
})

let data=await response.json()

if(data.success){
document.getElementById("result").innerHTML=
"Prediction: "+data.prediction+"<br>Confidence: "+data.confidence+"%"
}
else{
document.getElementById("result").innerHTML="Error: "+data.error
}

}

</script>

</body>
</html>
